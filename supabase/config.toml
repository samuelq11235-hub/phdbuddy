project_id = "phdbuddy"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = ""
url = ""
skip_nonce_check = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.process-document]
verify_jwt = true

[functions.ai-auto-code]
verify_jwt = true

[functions.apply-suggestion]
verify_jwt = true

[functions.suggest-codes-for-quote]
verify_jwt = true

[functions.cluster-themes]
verify_jwt = true

[functions.project-chat]
verify_jwt = true

[functions.embed-quotation]
verify_jwt = true

[functions.analyze-sentiment]
verify_jwt = true

[functions.code-network]
verify_jwt = true

[functions.suggest-relations]
verify_jwt = true

[functions.send-invitation]
verify_jwt = true

[functions.accept-invitation]
verify_jwt = true

[functions.export-project]
verify_jwt = true

[functions.import-project]
verify_jwt = true

[functions.compute-agreement]
verify_jwt = true

[functions.execute-query]
verify_jwt = true

[analytics]
enabled = false
